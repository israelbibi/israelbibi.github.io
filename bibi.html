<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibi Clicker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    position: relative;
    z-index: 10;
  }

  #title {
    font-size: 42px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 0 0 30px rgba(180,120,255,0.6);
  }

  #clippings-display {
    font-size: 28px;
    font-weight: 600;
    color: #e0cfff;
    letter-spacing: 1px;
  }

  #clippings-display span {
    color: #bf8fff;
    font-size: 34px;
    font-weight: 800;
  }

  #frenzy-bar-wrap {
    width: 300px;
    height: 14px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  #frenzy-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7c3aed, #c084fc);
    border-radius: 99px;
    transition: width 0.1s linear;
  }

  #frenzy-label {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #click-area {
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  #bibi-img {
    width: 200px;
    height: 200px;
    object-fit: contain;
    transform-origin: center;
    pointer-events: none;
    will-change: transform;
  }

  #cps-display {
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }

  .float-text {
    position: fixed;
    font-size: 22px;
    font-weight: 700;
    color: #c084fc;
    pointer-events: none;
    animation: floatUp 0.8s ease-out forwards;
    z-index: 999;
    text-shadow: 0 0 10px rgba(180,100,255,0.8);
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
  }

  #frenzy-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }

  #frenzy-text {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) scale(1);
    font-size: 30px;
    font-weight: 800;
    color: #c084fc;
    letter-spacing: 3px;
    white-space: nowrap;
    opacity: 0;
    text-shadow: 0 0 20px rgba(200,100,255,0.9);
    pointer-events: none;
    z-index: 100;
  }

  #multiplier-display {
    font-size: 15px;
    color: rgba(180,120,255,0.6);
    min-height: 20px;
  }

  #star-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<div id="game-wrapper">
  <div id="title">✂ Bibi Clicker</div>
  <div id="clippings-display">Clippings: <span id="score">0</span></div>
  <div id="multiplier-display"></div>
  <div id="frenzy-bar-wrap">
    <div id="frenzy-bar"></div>
  </div>
  <div id="frenzy-label">Money Donated</div>
  <div id="click-area">
    <img id="bibi-img" src="bibi.png" alt="Bibi" draggable="false">
  </div>
  <div id="cps-display">CPS: <span id="cps">0</span></div>
</div>

<div id="frenzy-overlay"></div>
<div id="frenzy-text">✡️ LORD YAHU ✡️</div>

<audio id="bg-music" src="music.mp3" loop></audio>

<script>
  const clickArea     = document.getElementById('click-area');
  const bibiImg       = document.getElementById('bibi-img');
  const scoreEl       = document.getElementById('score');
  const cpsEl         = document.getElementById('cps');
  const frenzyBar     = document.getElementById('frenzy-bar');
  const frenzyText    = document.getElementById('frenzy-text');
  const frenzyOverlay = document.getElementById('frenzy-overlay');
  const multEl        = document.getElementById('multiplier-display');
  const music         = document.getElementById('bg-music');
  const starCanvas    = document.getElementById('star-canvas');
  const ctx           = starCanvas.getContext('2d');
  const gameWrapper   = document.getElementById('game-wrapper');
  const titleEl       = document.getElementById('title');
  const clippingsEl   = document.getElementById('clippings-display');
  const barWrap       = document.getElementById('frenzy-bar-wrap');
  const labelEl       = document.getElementById('frenzy-label');

  let score = 0;
  let rotation = 0;
  let frenzy = 0;
  const FRENZY_MAX   = 100;
  const FRENZY_DECAY = 10; // faster drain

  let clickTimestamps = [];
  let cps = 0;
  let shakeX = 0, shakeY = 0;
  let musicVolume = 0;
  music.volume = 0;

  let pulseT = 0; // time accumulator for pulsing

  function resizeCanvas() {
    starCanvas.width  = window.innerWidth;
    starCanvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // --- Stars of David: many more ---
  const MAX_STARS = 22;
  const stars = [];

  function randomScreenPosition() {
    return {
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight
    };
  }

  for (let i = 0; i < MAX_STARS; i++) {
    const pos = randomScreenPosition();
    const baseSpeed = (Math.random() > 0.5 ? 1 : -1) * (0.3 + Math.random() * 0.6);
    stars.push({
      x: pos.x,
      y: pos.y,
      size: 40 + Math.random() * 130,
      rot: Math.random() * Math.PI * 2,
      baseRotSpeed: baseSpeed,
      rotSpeed: baseSpeed,
      opacity: 0,
      targetOpacity: 0,
      driftX: (Math.random() - 0.5) * 0.5,
      driftY: (Math.random() - 0.5) * 0.5,
      colorHue: 45 + Math.random() * 50, // gold/amber range
      pulseOffset: Math.random() * Math.PI * 2,
    });
  }

  function drawStarOfDavid(cx, cy, size, rot, opacity, hue) {
    if (opacity <= 0.005) return;
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.translate(cx, cy);
    ctx.rotate(rot);

    const r = size;

    function triangle(radius, angle) {
      ctx.beginPath();
      for (let k = 0; k < 3; k++) {
        const a = angle + (k * Math.PI * 2) / 3;
        k === 0 ? ctx.moveTo(Math.cos(a)*radius, Math.sin(a)*radius)
                : ctx.lineTo(Math.cos(a)*radius, Math.sin(a)*radius);
      }
      ctx.closePath();
    }

    ctx.shadowColor = `hsla(${hue},90%,65%,1)`;
    ctx.shadowBlur  = 30;

    ctx.fillStyle = `hsla(${hue},85%,60%,0.15)`;
    triangle(r, -Math.PI / 2); ctx.fill();
    ctx.fillStyle = `hsla(${hue+20},85%,60%,0.15)`;
    triangle(r, Math.PI / 2);  ctx.fill();

    ctx.lineWidth = 3;
    ctx.strokeStyle = `hsla(${hue},90%,72%,0.95)`;
    triangle(r, -Math.PI / 2); ctx.stroke();
    ctx.strokeStyle = `hsla(${hue+20},90%,78%,0.95)`;
    triangle(r, Math.PI / 2);  ctx.stroke();

    ctx.restore();
  }

  function getMultiplier(c) {
    if (c >= 20) return 5;
    if (c >= 14) return 4;
    if (c >= 9)  return 3;
    if (c >= 5)  return 2;
    return 1;
  }

  function spawnFloatText(x, y, val) {
    const el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = '+' + val;
    el.style.left = (x - 20) + 'px';
    el.style.top  = (y - 20) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 850);
  }

  clickArea.addEventListener('click', (e) => {
    const now = Date.now();
    clickTimestamps.push(now);
    clickTimestamps = clickTimestamps.filter(t => now - t < 1000);
    cps = clickTimestamps.length;

    const mult = getMultiplier(cps);
    score += mult;
    scoreEl.textContent = score.toLocaleString();
    frenzy = Math.min(FRENZY_MAX, frenzy + (cps * 0.8));
    spawnFloatText(e.clientX, e.clientY, mult);
    multEl.textContent = mult > 1 ? `×${mult} multiplier!` : '';
    cpsEl.textContent = cps;
  });

  function lerp(a, b, t) { return a + (b - a) * t; }

  let lastTime = performance.now();

  function loop(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    pulseT += dt;

    frenzy = Math.max(0, frenzy - FRENZY_DECAY * dt);
    const fr = frenzy / FRENZY_MAX;

    frenzyBar.style.width = (fr * 100) + '%';

    // --- Pulse ---
    // pulse oscillates faster and stronger at higher frenzy
    const pulseFreq = 1.5 + fr * 5;
    const pulseAmp  = fr * 0.08; // max 8% scale pulse
    const pulse     = 1 + Math.sin(pulseT * pulseFreq * Math.PI * 2) * pulseAmp;

    // Bibi rotation + pulse scale
    rotation += fr * 720 * dt;
    bibiImg.style.transform = `rotate(${rotation}deg) scale(${pulse.toFixed(4)})`;

    // Screen shake
    const targetShakeX = fr > 0.3 ? (Math.random() - 0.5) * fr * 20 : 0;
    const targetShakeY = fr > 0.3 ? (Math.random() - 0.5) * fr * 20 : 0;
    shakeX = lerp(shakeX, targetShakeX, 0.4);
    shakeY = lerp(shakeY, targetShakeY, 0.4);
    gameWrapper.style.transform = fr > 0.3
      ? `translate(${shakeX.toFixed(1)}px,${shakeY.toFixed(1)}px)`
      : '';

    // Pulse UI elements
    const uiPulse = 1 + Math.sin(pulseT * pulseFreq * Math.PI * 2) * (fr * 0.05);
    const uiPulseStr = `scale(${uiPulse.toFixed(4)})`;
    titleEl.style.transform     = fr > 0.2 ? uiPulseStr : '';
    clippingsEl.style.transform = fr > 0.2 ? uiPulseStr : '';
    barWrap.style.transform     = fr > 0.2 ? uiPulseStr : '';
    labelEl.style.transform     = fr > 0.2 ? uiPulseStr : '';
    multEl.style.transform      = fr > 0.2 ? uiPulseStr : '';

    // Pulse frenzy text size
    if (fr > 0.6) {
      const textPulse = 1 + Math.sin(pulseT * pulseFreq * Math.PI * 2) * 0.12;
      frenzyText.style.opacity   = ((fr - 0.6) / 0.4).toFixed(2);
      frenzyText.style.transform = `translateX(-50%) scale(${textPulse.toFixed(3)})`;
      frenzyOverlay.style.boxShadow =
        `inset 0 0 ${80 * fr * pulse}px rgba(140,40,255,${(fr * 0.55).toFixed(2)})`;
    } else {
      frenzyText.style.opacity   = '0';
      frenzyText.style.transform = 'translateX(-50%) scale(1)';
      frenzyOverlay.style.boxShadow = '';
    }

    // Music fade
    musicVolume = lerp(musicVolume, fr, 0.05);
    music.volume = Math.min(1, Math.max(0, musicVolume));
    if (musicVolume > 0.02 && music.paused) music.play().catch(() => {});
    else if (musicVolume < 0.01 && !music.paused) music.pause();

    // Background hue shift + pulse brightness
    const hue  = 260 + fr * 60;
    const lPulse = 4 + fr * 10 + Math.sin(pulseT * pulseFreq * Math.PI * 2) * fr * 4;
    document.body.style.background =
      `hsl(${hue.toFixed(0)},${(20 + fr*30).toFixed(0)}%,${lPulse.toFixed(1)}%)`;

    // --- Stars of David ---
    for (let i = 0; i < MAX_STARS; i++) {
      const threshold = (i + 1) / MAX_STARS;
      const starPulse = 1 + Math.sin(pulseT * pulseFreq * Math.PI * 2 + stars[i].pulseOffset) * fr * 0.3;
      stars[i].targetOpacity = fr > threshold
        ? Math.min(1, (fr - threshold) / 0.08) * 0.8 * starPulse
        : 0;
      stars[i].opacity = lerp(stars[i].opacity, stars[i].targetOpacity, 0.05);
      // Spin speed scales with frenzy
      stars[i].rotSpeed = stars[i].baseRotSpeed * (1 + fr * 5);
      stars[i].rot += stars[i].rotSpeed * dt;
      stars[i].x += stars[i].driftX * (1 + fr * 3);
      stars[i].y += stars[i].driftY * (1 + fr * 3);
      const w = window.innerWidth, h = window.innerHeight;
      if (stars[i].x < -200) stars[i].x = w + 100;
      if (stars[i].x > w + 200) stars[i].x = -100;
      if (stars[i].y < -200) stars[i].y = h + 100;
      if (stars[i].y > h + 200) stars[i].y = -100;
    }

    ctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
    for (const star of stars) {
      const displaySize = star.size * (1 + Math.sin(pulseT * pulseFreq * Math.PI * 2 + star.pulseOffset) * fr * 0.15);
      drawStarOfDavid(star.x, star.y, displaySize, star.rot, star.opacity, star.colorHue + fr * 30);
    }

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);

  setInterval(() => {
    const now = Date.now();
    clickTimestamps = clickTimestamps.filter(t => now - t < 1000);
    cps = clickTimestamps.length;
    cpsEl.textContent = cps;
  }, 200);
</script>
</body>
</html>
